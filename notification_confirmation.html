<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知确认回执</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .notice-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .notice-box h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .notice-box p {
            color: #555;
            line-height: 1.6;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .required::after {
            content: " *";
            color: #e74c3c;
        }

        input[type="text"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-icon {
            font-size: 60px;
            color: #27ae60;
            margin-bottom: 20px;
        }

        .success-message h2 {
            color: #27ae60;
            margin-bottom: 10px;
        }

        .success-message p {
            color: #666;
            font-size: 15px;
        }

        .stats {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .stats strong {
            color: #667eea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 表单部分 -->
        <div id="formSection">
            <div class="header">
                <h1>📋 通知确认回执</h1>
                <p>请认真阅读通知内容并填写确认信息</p>
            </div>

            <div class="notice-box">
                <h3>📢 通知内容</h3>
                <p id="noticeContent">
                    【示例】请各位同事于本周五（6月20日）下午3点参加季度总结会议，
                    地点：公司三楼会议室。请提前准备好本部门的工作汇报材料。
                </p>
            </div>

            <form id="confirmationForm">
                <div class="form-group">
                    <label for="name" class="required">姓名</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="请输入您的姓名" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="company" class="required">所属企业/部门</label>
                    <input 
                        type="text" 
                        id="company" 
                        name="company" 
                        placeholder="请输入您所在的企业或部门名称" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">联系电话</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="请输入您的手机号码"
                    >
                </div>

                <div class="form-group">
                    <label class="required">确认状态</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="status" value="收到" required>
                            <span>✅ 收到，已知晓</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="status" value="有疑问">
                            <span>❓ 有疑问，需咨询</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="remark">备注说明（选填）</label>
                    <textarea 
                        id="remark" 
                        name="remark" 
                        rows="3" 
                        placeholder="如有特殊情况或疑问，请在此说明..."
                    ></textarea>
                </div>

                <button type="submit" class="submit-btn">提交确认</button>
            </form>

            <div class="stats">
                已有 <strong id="confirmedCount">0</strong> 人确认 | 总计 <strong>XXX</strong> 人
            </div>
        </div>

        <!-- 成功提示部分 -->
        <div id="successSection" class="success-message">
            <div class="success-icon">✓</div>
            <h2>提交成功！</h2>
            <p>感谢您的及时确认，我们已收到您的回复。</p>
            <p style="margin-top: 15px; font-size: 13px; color: #999;">
                您可以关闭此页面
            </p>
        </div>
    </div>

    <script>
        // 表单提交处理
        document.getElementById('confirmationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const formData = {
                name: document.getElementById('name').value,
                company: document.getElementById('company').value,
                phone: document.getElementById('phone').value,
                status: document.querySelector('input[name="status"]:checked').value,
                remark: document.getElementById('remark').value,
                timestamp: new Date().toLocaleString('zh-CN')
            };

            // 这里可以添加数据提交逻辑
            console.log('提交的数据：', formData);
            
            // 模拟提交成功（实际使用时需要连接到后端API）
            // fetch('your-api-endpoint', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify(formData)
            // })
            
            // 显示成功消息
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('successSection').classList.add('show');
            
            // 可选：将数据存储到本地（演示用）
            saveToLocal(formData);
        });

        // 保存到本地存储（演示用，实际应使用后端API）
        function saveToLocal(data) {
            let confirmations = JSON.parse(localStorage.getItem('confirmations') || '[]');
            confirmations.push(data);
            localStorage.setItem('confirmations', JSON.stringify(confirmations));
            updateStats();
        }

        // 更新统计信息
        function updateStats() {
            let confirmations = JSON.parse(localStorage.getItem('confirmations') || '[]');
            document.getElementById('confirmedCount').textContent = confirmations.length;
        }

        // 页面加载时更新统计
        updateStats();

        // 使用说明：
        // 1. 修改通知内容：编辑 noticeContent 元素中的文本
        // 2. 连接后端：取消注释 fetch 部分，替换为你的API地址
        // 3. 查看数据：在浏览器控制台输入 JSON.parse(localStorage.getItem('confirmations'))
    </script>
</body>
</html>
